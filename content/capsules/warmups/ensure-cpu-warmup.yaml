id: ensure-cpu-warmup
title: "Warm-up: Check the Device"
type: implementation
difficulty: trivial
estimated_minutes: 2

parent_capsule: devices

prompt: |
  Given a tensor `x`, return a string describing its device type. Use the
  `.device.type` attribute to get the device type as a string (e.g. "cpu").

starter_code: |
  import torch


  def device_type(x: torch.Tensor) -> str:
      # Return the device type of x as a string (e.g. "cpu").
      pass

function_name: device_type

constraints:
  - Must return a string.
  - Do not hardcode the answer.

visible_tests:
  - name: returns-cpu
    description: "A CPU tensor should return 'cpu'."
    kind: expect_value
    input: [1.0, 2.0]
    params:
      expected: "cpu"

solution_inline: |
  return x.device.type

sources:
  - torch-tensor-device

verification:
  status: verified
  verified_at: "2026-06-16"
