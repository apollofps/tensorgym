id: broadcasting
title: Broadcasting Rules
estimated_minutes: 5

supported_pytorch_version: "2.12.0"

summary: |
  Broadcasting lets PyTorch perform element-wise operations on tensors with
  different shapes without making explicit copies. When you add a (3, 4) matrix
  and a (4,) vector, PyTorch "stretches" the vector across every row of the
  matrix automatically.

  The broadcasting rules are simple. Shapes are compared element-by-element
  starting from the trailing (rightmost) dimension. Two dimensions are compatible
  if they are equal, or one of them is 1. If one tensor has fewer dimensions, its
  shape is padded with 1s on the left until both have the same rank.

  For example, adding shapes (2, 3) and (3,): the vector (3,) is padded to
  (1, 3), and then the size-1 dimension stretches to match 2, producing shape
  (2, 3). Each row of the matrix gets the same vector added.

  A common use case is adding a bias vector to every row of a matrix, or
  subtracting a per-channel mean from a batch of images. Understanding
  broadcasting is essential because it underpins most tensor arithmetic and
  avoids expensive explicit loops or copies.

learning_objectives:
  - State the three broadcasting rules and apply them to determine result shapes.
  - Predict whether two tensor shapes are broadcast-compatible.
  - Add a 1-D bias to every row of a 2-D matrix using broadcasting.

interactive_example: examples/broadcasting_example.py

warmup_challenge_id: add-bias-warmup

common_mistakes:
  - Expecting broadcasting to work when shapes differ in a non-trailing dimension without unsqueezing.
  - Forgetting that broadcasting pads with 1s on the LEFT, not the right.
  - Assuming a (3,) vector broadcasts as a column vector against a (3, 4) matrix — it broadcasts as a row.

sources:
