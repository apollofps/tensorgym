prompt: |
  Implement `swap_last_two(x)` that transposes the last two dimensions of a
  tensor. For example, a tensor of shape (2, 3, 4) becomes (2, 4, 3).

  This must work for tensors with any number of dimensions (at least 2).
  Do not use Python loops.

