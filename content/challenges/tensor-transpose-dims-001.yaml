hints:
  - level: 0
    text: You need to swap the last two dimensions — how do you refer to them without hardcoding?
  - level: 1
    text: Negative indices work for dimensions too. The last dimension is -1, the second-to-last is -2.
  - level: 2
    text: torch.Tensor.transpose(dim0, dim1) swaps two dimensions.
  - level: 3
    text: "x.transpose(-2, -1) swaps the last two dimensions regardless of total rank."
  - level: 4
    text: "return x.transpose(-2, -1)"

