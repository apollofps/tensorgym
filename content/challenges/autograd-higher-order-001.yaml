id: autograd-higher-order-001
title: Second Derivative with create_graph
type: implementation
difficulty: hard

concepts_taught:
  - higher-order-gradients
concepts_tested:
  - autograd
  - create-graph

required_prerequisites:
  - autograd-basics
optional_prerequisites: []

concept_capsules:
  - autograd-basics

prompt: |
  Implement `second_derivative(x)` that computes the second derivative of
  f(x) = x⁴ at each element.

  f'(x) = 4x³, f''(x) = 12x². Use torch.autograd.grad with create_graph=True
  to get the first derivative, then call grad again for the second. Return the
  second derivative.

starter_code: |
  import torch


  def second_derivative(x: torch.Tensor) -> torch.Tensor:
      pass

function_name: second_derivative

constraints:
  - Use torch.autograd.grad (not .backward()) with create_graph=True for the first derivative.
  - Do not compute the analytical formula directly.

visible_tests:
  - name: basic-values
    description: "12x² at [1.0, 2.0] gives [12.0, 48.0]."
    kind: exact_allclose
    input:
      args: [[1.0, 2.0]]
    params:
      expected: [12.0, 48.0]
  - name: output-shape
    description: "Output shape must match input shape."
    kind: expect_shape
    input:
      args: [[1.0, 2.0]]
    params:
      shape: [2]

hidden_test_file: tests/autograd_higher_order_001_hidden.py

hints:
  - level: 0
    text: "create_graph=True keeps the computation graph for the gradient itself."
  - level: 1
    text: "torch.autograd.grad(outputs, inputs, create_graph=True) returns a tuple."
  - level: 2
    text: "Compute grad1 with create_graph=True, then compute grad of grad1.sum() w.r.t. x."
  - level: 3
    text: "x = x.clone().requires_grad_(True); y = (x**4).sum(); grad1 = torch.autograd.grad(y, x, create_graph=True)[0]; grad2 = torch.autograd.grad(grad1.sum(), x)[0]; return grad2"

solution_file: solutions/autograd_higher_order_001.py

estimated_minutes: 12

sources:
  - torch-autograd
  - torch-backward

