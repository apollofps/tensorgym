prompt: |
  Implement `select_rows(data, indices)` that selects rows from a 2-D tensor
  using an index tensor.

  `data` has shape (N, D) and `indices` is a 1-D integer tensor of shape (K,)
  with values in [0, N). Return the selected rows as a tensor of shape (K, D).

  Use tensor indexing — no Python loops.

starter_code: |
  import torch


  def select_rows(data: torch.Tensor, indices: torch.Tensor) -> torch.Tensor:
      # data has shape (N, D), indices has shape (K,) with ints in [0, N).
      # Return selected rows with shape (K, D).
      pass

function_name: select_rows

constraints:
  - Do not use Python loops (for/while).
  - Output shape must be (K, D).

visible_tests:
  - name: values-correct
    description: Selecting rows [2, 0] from a 3x2 matrix should return those rows in order.
    kind: exact_allclose
    input:
      args: [[[10.0, 11.0], [20.0, 21.0], [30.0, 31.0]], [2, 0]]
    params:
      expected: [[30.0, 31.0], [10.0, 11.0]]
      input_dtype: "float32"
  - name: shape-correct
    description: Selecting 2 rows from a 3x2 matrix should produce shape (2, 2).
    kind: expect_shape
    input:
      args: [[[10.0, 11.0], [20.0, 21.0], [30.0, 31.0]], [2, 0]]
    params:
      shape: [2, 2]
      input_dtype: "float32"

hidden_test_file: tests/tensor_fancy_index_001_hidden.py

hints:
  - level: 0
    text: PyTorch supports advanced indexing with integer tensors, just like NumPy.
  - level: 1
    text: You can index a tensor's first dimension directly with another tensor.
  - level: 2
    text: "`data[indices.long()]` selects the rows at positions given by indices."
  - level: 3
    text: "Make sure indices is a LongTensor: `indices = indices.long()`."
  - level: 4
    text: "return data[indices.long()]"

