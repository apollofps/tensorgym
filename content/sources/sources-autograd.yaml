sources:
  - id: torch-autograd
    title: Autograd mechanics
    organization: PyTorch
    url: "https://docs.pytorch.org/docs/2.12/notes/autograd.html"
    source_type: official_documentation
    documentation_version: "2.12"
    accessed_at: "2026-06-15"
    supports:
      - "PyTorch uses reverse-mode automatic differentiation."
      - "requires_grad=True on a tensor enables gradient tracking."
      - "backward() computes gradients of all leaves with requires_grad=True."
  - id: torch-no-grad
    title: torch.no_grad
    organization: PyTorch
    url: "https://docs.pytorch.org/docs/2.12/generated/torch.no_grad.html"
    source_type: official_documentation
    documentation_version: "2.12"
    accessed_at: "2026-06-15"
    supports:
      - "torch.no_grad() disables gradient computation in its scope."
  - id: torch-tensor-detach
    title: torch.Tensor.detach
    organization: PyTorch
    url: "https://docs.pytorch.org/docs/2.12/generated/torch.Tensor.detach.html"
    source_type: official_documentation
    documentation_version: "2.12"
    accessed_at: "2026-06-15"
    supports:
      - "detach() returns a new tensor detached from the computation graph."
  - id: torch-tensor-grad
    title: torch.Tensor.grad
    organization: PyTorch
    url: "https://docs.pytorch.org/docs/2.12/autograd.html"
    source_type: official_documentation
    documentation_version: "2.12"
    accessed_at: "2026-06-15"
    supports:
      - "After backward(), leaf tensors with requires_grad=True have their .grad populated."
